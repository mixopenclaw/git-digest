openapi: 3.0.0
info:
  title: Git-Digest API (partial)
  version: 0.1.0
paths:
  /api/scan:
    post:
      summary: Queue a scan
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: queued
          content:
            application/json:
              schema:
                type: object
  /api/scan/{id}/results:
    get:
      summary: Get scan results
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: results
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: healthy
servers:
  - url: http://localhost:8080
